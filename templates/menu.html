<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Kids Web</title>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; background-color: #E0F7FA; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #006064; margin-bottom: 30px; }
        .btn { display: block; width: 100%; max-width: 300px; margin: 15px auto; padding: 20px; font-size: 1.3rem; color: #263238; border: none; border-radius: 15px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 0px rgba(0,0,0,0.2); transition: transform 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .soma { background-color: #81D4FA; }
        .sub { background-color: #EF9A9A; }
        .mult { background-color: #FFCC80; }
        .div { background-color: #CE93D8; }
        .todas { background-color: #80CBC4; }
    </style>
</head>
<body>
    <h1>O que vamos estudar? 🎓</h1>
    <a href="/iniciar/+" class="btn soma">➕ Adição</a>
    <a href="/iniciar/-" class="btn sub">➖ Subtração</a>
    <a href="/iniciar/*" class="btn mult">✖️ Multiplicação</a>
    <a href="/iniciar//" class="btn div">➗ Divisão</a>
    <a href="/iniciar/todas" class="btn todas">🎲 Tudo Misturado</a>
</body>
</html>
