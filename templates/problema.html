<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio de Problemas</title>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; background-color: #FFF3E0; text-align: center; padding: 10px; margin: 0; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #FFCC80; border-radius: 0 0 15px 15px; margin-bottom: 20px; }
        .btn-voltar { background-color: #EF6C00; color: white; padding: 8px 15px; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .score { font-size: 1.5rem; color: #BF360C; font-weight: bold; }
        
        /* Estilo da Pergunta (Texto) */
        .caixa-pergunta {
            background: white;
            border: 4px solid #FF9800;
            border-radius: 15px;
            padding: 20px;
            margin: 10px auto;
            max-width: 500px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }
        .texto-pergunta { font-size: 1.6rem; color: #3E2723; font-weight: bold; line-height: 1.4; }
        
        /* Grid de Opções (2x2) */
        .grid-opcoes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 400px;
            margin: 20px auto;
            padding: 0 10px;
        }

        .btn-opcao {
            background-color: white;
            border: 3px solid #8D6E63;
            color: #3E2723;
            padding: 20px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.1s;
            width: 100%;
        }

        .btn-opcao:active { transform: scale(0.95); background-color: #D7CCC8; }

        /* Feedback */
        .feedback-area { margin-top: 10px; min-height: 60px; }
        .msg-feedback { font-size: 1.5rem; font-weight: bold; display: block; margin-bottom: 15px;}
        
        .btn-proxima { 
            background-color: #00C853; color: white; padding: 15px 40px; 
            text-decoration: none; font-size: 1.5rem; border-radius: 10px; 
            font-weight: bold; display: inline-block; box-shadow: 0 4px 0 #009624;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/" class="btn-voltar">⬅ Menu</a>
        <div class="score">⭐ {{ score }}</div>
    </div>

    <div class="caixa-pergunta">
        <div class="texto-pergunta">{{ pergunta }}</div>
    </div>

    <div class="feedback-area">
        {% if feedback %}
            <span class="msg-feedback" style="color: {{ cor_feedback }}">{{ feedback }}</span>
            <a href="/nova_pergunta_problema" class="btn-proxima">Próxima ➡</a>
        {% endif %}
    </div>

    {% if not feedback %}
    <form method="POST" action="/jogo_problema">
        <div class="grid-opcoes">
            {% for opcao in opcoes %}
                <button type="submit" name="resposta" value="{{ opcao }}" class="btn-opcao">
                    {{ opcao }}
                </button>
            {% endfor %}
        </div>
    </form>
    {% endif %}

</body>
</html>
